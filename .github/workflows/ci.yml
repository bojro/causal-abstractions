name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py"

      - name: Run contract tests
        run: python -m unittest discover -s tests/contract -p "test_*.py"

      - name: Run tiny integration smoke
        run: python -m unittest tests.integration.test_addition_pipeline.AdditionPipelineIntegrationTests.test_small_compare_pipeline
